<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 300" width="350">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f0f23"/>
      <stop offset="50%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="border" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff6b6b"/>
      <stop offset="50%" stop-color="#feca57"/>
      <stop offset="100%" stop-color="#ff9ff3"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="500" height="300" rx="16" fill="url(#bg)"/>

  <!-- Border -->
  <rect x="4" y="4" width="492" height="292" rx="14" fill="none" stroke="url(#border)" stroke-width="3"/>

  <!-- Terminal chrome -->
  <circle cx="22" cy="22" r="6" fill="#ff6b6b" opacity="0.9"/>
  <circle cx="40" cy="22" r="6" fill="#feca57" opacity="0.9"/>
  <circle cx="58" cy="22" r="6" fill="#1dd1a1" opacity="0.9"/>

  <!-- Title -->
  <text x="250" y="65" text-anchor="middle" font-family="Monaco, 'Courier New', monospace" font-size="32" font-weight="bold" fill="#feca57" filter="url(#glow)">oh-my-auggie</text>
  <text x="250" y="90" text-anchor="middle" font-family="Monaco, 'Courier New', monospace" font-size="11" fill="#54a0ff">The &quot;oh-my-*&quot; experience for Augment Code</text>

  <!-- Terminal window -->
  <rect x="50" y="110" width="400" height="130" rx="8" fill="#0d0d1a" stroke="#2d2d5a" stroke-width="1.5"/>

  <!-- Terminal prompt -->
  <text x="70" y="138" font-family="Monaco, 'Courier New', monospace" font-size="13" fill="#1dd1a1">$</text>
  <text x="86" y="138" font-family="Monaco, 'Courier New', monospace" font-size="13" fill="#54a0ff">auggie</text>
  <text x="130" y="138" font-family="Monaco, 'Courier New', monospace" font-size="13" fill="#a29bfe">orchestrator</text>
  <text x="218" y="138" font-family="Monaco, 'Courier New', monospace" font-size="13" fill="#feca57">--goal</text>
  <text x="260" y="138" font-family="Monaco, 'Courier New', monospace" font-size="13" fill="#ffffff">&quot;ship it&quot;</text>

  <!-- Output lines -->
  <text x="70" y="162" font-family="Monaco, 'Courier New', monospace" font-size="11" fill="#636e72">▶ Explorer → Planner → Executor → Architect</text>
  <text x="70" y="180" font-family="Monaco, 'Courier New', monospace" font-size="11" fill="#1dd1a1">✓ Pipeline complete — PASS</text>
  <text x="70" y="198" font-family="Monaco, 'Courier New', monospace" font-size="11" fill="#54a0ff">  └── Multi-agent orchestration, enterprise-ready</text>
  <text x="70" y="216" font-family="Monaco, 'Courier New', monospace" font-size="11" fill="#a29bfe">  └── CI/CD native — GitHub Actions included</text>

  <!-- Blinking cursor -->
  <rect x="70" y="224" width="8" height="14" fill="#feca57" opacity="0.9">
    <animate attributeName="opacity" values="0.9;0.3;0.9" dur="1s" repeatCount="indefinite"/>
  </rect>

  <!-- Sparkle accent -->
  <g transform="translate(430, 55)" filter="url(#glow)">
    <text font-size="24" fill="#feca57">✦</text>
  </g>

  <!-- Bottom tagline -->
  <text x="250" y="270" text-anchor="middle" font-family="Monaco, 'Courier New', monospace" font-size="10" fill="#636e72">Multi-agent • CI/CD Native • Enterprise Ready</text>
</svg>
