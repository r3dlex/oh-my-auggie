name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      issues: write
      pull-requests: write

    outputs:
      new-release-published: ${{ steps.semantic.outputs.new_release_published }}
      new-release-version: ${{ steps.semantic.outputs.new_release_version }}
      new-release-channel: ${{ steps.semantic.outputs.new_release_channel }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@r3dlex'

      - name: Install dependencies
        run: cd plugins/oma && npm ci

      - name: Build
        run: cd plugins/oma && npm run prepare

      - name: Run tests
        run: cd plugins/oma && npm test

      - name: Semantic Release
        id: semantic
        uses: cycjimmy/semantic-release-action@v4
        with:
          extra_plugins: |
            @semantic-release/changelog
            @semantic-release/git
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-npm:
    needs: release
    if: needs.release.outputs.new-release-published == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Resolve publish version
        id: ver
        run: |
          if [ -n "${{ needs.release.outputs.new-release-version }}" ]; then
            echo "tag=v${{ needs.release.outputs.new-release-version }}" >> "$GITHUB_OUTPUT"
            echo "channel=${{ needs.release.outputs.new-release-channel }}" >> "$GITHUB_OUTPUT"
          else
            LATEST=$(git ls-remote --tags --sort=-v:refname origin 'refs/tags/v*' | head -1 | sed 's|.*refs/tags/||')
            echo "tag=${LATEST}" >> "$GITHUB_OUTPUT"
            echo "channel=" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.ver.outputs.tag }}

      - name: Setup Node.js for npmjs.com
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Upgrade npm for OIDC Trusted Publishing support
        run: npm install -g npm@latest

      - name: Install dependencies
        run: cd plugins/oma && npm ci

      - name: Build
        run: cd plugins/oma && npm run prepare

      - name: Strip publishConfig and prepare script
        run: |
          cd plugins/oma
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            delete pkg.publishConfig;
            if (pkg.scripts) delete pkg.scripts.prepare;
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

      - name: Publish oh-my-auggie (unscoped) to npmjs.com
        run: |
          # Remove static auth token so npm uses OIDC Trusted Publishing instead (requires npm ≥ 11.5.1)
          sed -i '/^\/\/registry\.npmjs\.org\/:_authToken/d' "${NPM_CONFIG_USERCONFIG:-$HOME/.npmrc}" || true
          unset NODE_AUTH_TOKEN
          CHANNEL="${{ steps.ver.outputs.channel }}"
          TAG="${CHANNEL:-latest}"
          # Rename to unscoped; runner is ephemeral
          cd plugins/oma && npm pkg set name="oh-my-auggie"
          npm publish --tag "$TAG" --provenance --access public || echo "::warning::Publish skipped — version already exists or package not yet on npmjs.com (idempotent)"
