name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@r3dlex'

      - name: Install dependencies
        run: cd plugins/oma && npm install

      - name: Build
        run: cd plugins/oma && npm run prepare

      - name: Run tests
        run: cd plugins/oma && npm test

      - name: Determine dist-tag and set unique version
        id: dist-tag
        run: |
          if [[ $GITHUB_REF_NAME == *-alpha.* ]]; then
            echo "tag=alpha" >> $GITHUB_OUTPUT
          elif [[ $GITHUB_REF_NAME == *-beta.* ]]; then
            echo "tag=beta" >> $GITHUB_OUTPUT
          else
            echo "tag=latest" >> $GITHUB_OUTPUT
          fi
          VERSION="${GITHUB_REF_NAME#v}"
          # Append short git SHA to pre-release versions for idempotent re-runs
          if [[ $VERSION == *"-"* ]]; then
            SHA=$(git rev-parse --short=7 HEAD)
            VERSION="${VERSION}+sha.${SHA}"
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Patch package.json for unique version
        run: |
          cd plugins/oma
          VERSION="${{ steps.dist-tag.outputs.version }}"
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.version = '$VERSION';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "
          echo "Patched version to $VERSION"

      - name: Publish to GitHub Packages
        run: |
          cd plugins/oma
          npm publish --tag ${{ steps.dist-tag.outputs.tag }} --force
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
